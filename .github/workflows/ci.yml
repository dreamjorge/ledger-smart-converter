name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-3.11-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-3.11-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile checks
        run: |
          python -m py_compile src/web_app.py
          python -m py_compile src/generic_importer.py
          python -m py_compile src/healthcheck.py

      - name: Run fast tests with coverage
        run: |
          python -m pytest -m "not slow" \
            --cov=src \
            --cov-report=term \
            --cov-report=html \
            --cov-config=.coveragerc \
            --cov-fail-under=80 \
            -q

      - name: Run slow ML tests
        run: |
          python -m pytest -m "slow" -q --tb=short

      - name: Validate DB schema
        run: |
          sqlite3 :memory: < src/database/schema.sql && echo "Schema OK"
